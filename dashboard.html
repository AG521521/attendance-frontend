<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AG工作室 - 控制面板</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --brand: #667eea;
      --brand-dark: #5a6fd6;
      --bg: #f5f7fa;
      --card: #fff;
      --text: #333;
      --text-secondary: #888;
      --border: #e8ecf1;
      --success: #28a745;
      --danger: #dc3545;
      --warning: #f39c12;
      --info: #17a2b8;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --transition: 0.2s;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
    }
    .header {
      background: var(--brand);
      color: #fff;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header h1 { font-size: 22px; }
    .user-info { display: flex; align-items: center; gap: 12px; }
    .user-info span { font-size: 14px; opacity: 0.9; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
      background: #fff;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-primary { background: var(--brand); color: #fff; border-color: var(--brand); }
    .btn-success { background: var(--success); color: #fff; border-color: var(--success); }
    .btn-danger { background: var(--danger); color: #fff; border-color: var(--danger); }
    .btn-outline { background: #fff; color: var(--text); border: 1px solid var(--border); }
    .btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }

    .container { max-width: 1200px; margin: 24px auto; padding: 0 16px; }
    .layout { display: flex; gap: 24px; }
    .sidebar {
      width: 240px;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 8px 0;
      height: fit-content;
      position: sticky;
      top: 24px;
      flex-shrink: 0;
    }
    .sidebar-menu { list-style: none; }
    .menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: var(--transition);
      border-left: 3px solid transparent;
      font-size: 14px;
    }
    .menu-item i { width: 20px; font-size: 16px; text-align: center; }
    .menu-item:hover { background: var(--bg); color: var(--brand); }
    .menu-item.active {
      background: linear-gradient(90deg, rgba(102,126,234,0.08) 0%, transparent 100%);
      color: var(--brand);
      border-left-color: var(--brand);
      font-weight: 500;
    }
    .content { flex: 1; min-width: 0; }
    .page { display: none; }
    .page.active { display: block; }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }
    .card h2 { font-size: 18px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
    .card h3 { font-size: 16px; margin-bottom: 12px; }

    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
    .stat-card { background: var(--card); padding: 18px; border-radius: var(--radius); box-shadow: var(--shadow); text-align: center; }
    .stat-value { font-size: 26px; font-weight: 700; }
    .stat-label { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 14px; color: var(--text); }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      transition: border var(--transition);
      background: #fff;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .weekday-selector { display: flex; gap: 6px; flex-wrap: wrap; }
    .weekday-btn {
      width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--border);
      background: #fff; cursor: pointer; font-size: 13px; transition: var(--transition);
    }
    .weekday-btn.selected { background: var(--brand); color: #fff; border-color: var(--brand); }

    .list-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px;
      flex-wrap: wrap; gap: 10px;
    }
    .list-item h4 { font-size: 15px; margin-bottom: 4px; }
    .list-item p { font-size: 13px; color: var(--text-secondary); }
    .badge {
      display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500;
    }
    .badge-success { background: #d4edda; color: #155724; }
    .badge-danger { background: #f8d7da; color: #721c24; }
    .badge-warning { background: #fff3cd; color: #856404; }
    .badge-info { background: #d1ecf1; color: #0c5460; }

    .log-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .log-row .status { font-size: 18px; width: 30px; }
    .log-row .detail { flex: 1; }
    .log-row .detail .title { font-weight: 500; }
    .log-row .detail .time { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .log-row .msg { font-size: 13px; color: var(--text-secondary); max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1a1a2e; color: #fff; padding: 12px 24px; border-radius: 10px;
      z-index: 2000; font-size: 14px; display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      white-space: nowrap;
    }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }
    .toast.info { background: #1a1a2e; }
    .toast.show { display: block; animation: toastIn 0.3s; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

    .invite-box { text-align: center; padding: 10px 0; }
    .invite-code-display {
      font-size: 28px; font-weight: 700; letter-spacing: 6px; background: var(--bg);
      padding: 14px 24px; border-radius: 10px; display: inline-block; margin: 8px 0;
      user-select: all; cursor: pointer;
    }
    .copy-btn-group { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 8px; }

    .empty { text-align: center; padding: 30px; color: var(--text-secondary); }
    .loading { text-align: center; padding: 20px; color: var(--text-secondary); }

    .hidden { display: none !important; }

    /* 移动端 */
    @media (max-width: 768px) {
      .layout { flex-direction: column; }
      .sidebar {
        width: 100%; position: static; border-radius: var(--radius);
        padding: 4px 0; overflow-x: auto;
      }
      .sidebar-menu { display: flex; min-width: max-content; }
      .menu-item {
        border-left: none; border-bottom: 3px solid transparent;
        padding: 10px 14px; white-space: nowrap; font-size: 13px;
      }
      .menu-item.active { border-left-color: transparent; border-bottom-color: var(--brand); }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .form-row { grid-template-columns: 1fr; }
      .card { padding: 14px 16px; }
      .header { padding: 12px 16px; }
      .header h1 { font-size: 18px; }
      .list-item { flex-direction: column; align-items: flex-start; }
    }
    @media (max-width: 400px) {
      .stats-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1><i class="fas fa-robot"></i> 控制面板</h1>
    <div class="user-info">
      <span id="userName">加载中...</span>
      <button class="btn btn-sm" onclick="logout()" style="background:rgba(255,255,255,0.15);color:#fff;border:none;"><i class="fas fa-sign-out-alt"></i> 退出</button>
    </div>
  </div>

  <div class="container">
    <div class="layout">
      <!-- 侧栏 -->
      <div class="sidebar">
        <ul class="sidebar-menu">
          <li class="menu-item active" data-page="dashboard"><i class="fas fa-home"></i> 首页</li>
          <li class="menu-item" data-page="subscriptions"><i class="fas fa-calendar-check"></i> 签到任务</li>
          <li class="menu-item" data-page="email"><i class="fas fa-envelope"></i> 邮箱</li>
          <li class="menu-item" data-page="invite"><i class="fas fa-gift"></i> 邀请</li>
          <li class="menu-item" data-page="feedback"><i class="fas fa-comment"></i> 留言</li>
          <li class="menu-item" data-page="buy"><i class="fas fa-shopping-cart"></i> 购买</li>
          <li class="menu-item" data-page="logs"><i class="fas fa-history"></i> 记录</li>
          <li class="menu-item" data-page="profile"><i class="fas fa-user"></i> 我的</li>
        </ul>
      </div>
      <!-- 内容 -->
      <div class="content">
        <!-- 首页 -->
        <div id="page-dashboard" class="page active">
          <div id="noticeCard" class="card hidden"><h2 id="noticeTitle"></h2><div id="noticeContent"></div></div>
          <div class="stats-grid">
            <div class="stat-card"><div class="stat-value" id="statTotalSigns">0</div><div class="stat-label">累计</div></div>
            <div class="stat-card"><div class="stat-value" id="statSuccessSigns">0</div><div class="stat-label">成功</div></div>
            <div class="stat-card"><div class="stat-value" id="statTodaySigns">0</div><div class="stat-label">今日</div></div>
            <div class="stat-card"><div class="stat-value" id="statActiveSubs">0</div><div class="stat-label">任务</div></div>
          </div>
          <div class="card">
            <h2><i class="fas fa-bolt" style="color:var(--warning);"></i> 快速签到</h2>
            <button class="btn btn-success" onclick="quickSign()" id="quickSignBtn"><i class="fas fa-pen"></i> 立即签到</button>
            <span id="signResult" style="margin-left:12px;"></span>
          </div>
          <div class="card"><h2><i class="fas fa-list-check"></i> 活跃任务</h2><div id="activeSubscriptionsList"><p class="loading">加载中...</p></div></div>
        </div>

        <!-- 签到任务 -->
        <div id="page-subscriptions" class="page">
          <div class="card">
            <h2><i class="fas fa-plus-circle"></i> 新建任务</h2>
            <div class="form-row">
              <div class="form-group"><label>名称</label><input type="text" id="courseName" value="晚寝签到"></div>
              <div class="form-group"><label>时间</label><input type="time" id="signTime" value="21:25"></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>重试次数</label><input type="number" id="maxRetries" value="3" min="1" max="5"></div>
              <div class="form-group"><label>自动签到</label><select id="autoSign"><option value="true">✅ 开启</option><option value="false">❌ 关闭</option></select></div>
            </div>
            <div class="form-group"><label>重复日期</label><div class="weekday-selector" id="weekdaySelector"><button class="weekday-btn selected" data-day="1">一</button><button class="weekday-btn selected" data-day="2">二</button><button class="weekday-btn selected" data-day="3">三</button><button class="weekday-btn selected" data-day="4">四</button><button class="weekday-btn selected" data-day="5">五</button><button class="weekday-btn" data-day="6">六</button><button class="weekday-btn" data-day="0">日</button></div></div>
            <button class="btn btn-primary" onclick="addSubscription()"><i class="fas fa-plus"></i> 添加</button>
          </div>
          <div class="card"><h2><i class="fas fa-list"></i> 任务列表</h2><div id="subscriptionsList"><p class="loading">加载中...</p></div></div>
        </div>

        <!-- 邮箱 -->
        <div id="page-email" class="page">
          <div class="card">
            <h2><i class="fas fa-envelope"></i> 邮箱绑定</h2>
            <div id="emailStatus"></div>
            <div id="emailBindForm">
              <div class="form-group"><label>邮箱</label><input type="email" id="bindEmail" placeholder="your@email.com"></div>
              <div style="display:flex;gap:10px;"><input type="text" id="emailCode" placeholder="验证码" style="flex:1;"><button class="btn btn-primary" id="sendCodeBtn" onclick="sendEmailCode()">发送验证码</button></div>
              <button class="btn btn-success" onclick="verifyEmail()" style="margin-top:12px;width:100%;"><i class="fas fa-check"></i> 验证绑定</button>
            </div>
            <div id="rebindArea" class="hidden" style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border);">
              <h3>更换邮箱</h3>
              <div class="form-group"><label>新邮箱</label><input type="email" id="rebindEmail"></div>
              <div style="display:flex;gap:10px;"><input type="text" id="rebindCode" placeholder="验证码" style="flex:1;"><button class="btn btn-primary" id="rebindSendBtn" onclick="sendRebindCode()">发送验证码</button></div>
              <button class="btn btn-warning" onclick="rebindEmail()" style="margin-top:12px;width:100%;">确认换绑</button>
              <button class="btn btn-danger" onclick="unbindEmail()" style="margin-top:8px;width:100%;"><i class="fas fa-unlink"></i> 解绑邮箱</button>
            </div>
          </div>
        </div>

        <!-- 邀请 -->
        <div id="page-invite" class="page">
          <div class="card invite-box">
            <h2><i class="fas fa-gift" style="color:var(--warning);"></i> 邀请好友</h2>
            <p style="margin:8px 0;font-size:18px;">双方各得 <strong style="color:var(--warning);"><span id="rewardDays">10</span> 天 VIP</strong></p>
            <p style="color:var(--text-secondary);font-size:13px;">复制链接或邀请码发给好友</p>
            <div style="margin:16px 0;">
              <p style="font-weight:500;margin-bottom:6px;">邀请码（点击复制）</p>
              <div class="invite-code-display" id="inviteCode" onclick="copyInviteCode()" title="点击复制">----</div>
            </div>
            <div class="copy-btn-group">
              <button class="btn btn-primary" onclick="copyInviteUrl()"><i class="fas fa-link"></i> 复制邀请链接</button>
              <button class="btn btn-outline" onclick="copyInviteCode()"><i class="fas fa-copy"></i> 复制邀请码</button>
            </div>
            <input type="text" id="inviteUrl" readonly class="hidden">
            <div style="margin-top:20px;"><strong>已邀请 <span id="inviteCount">0</span> 人</strong></div>
            <div id="invitedList" style="margin-top:8px;max-height:200px;overflow-y:auto;"></div>
          </div>
          <div class="card" id="bindInviteCard">
            <h2>我有邀请码</h2>
            <div id="bindInviteArea"></div>
            <div class="form-group"><input type="text" id="inputInviteCode" placeholder="输入8位邀请码" style="text-transform:uppercase;"></div>
            <button class="btn btn-success" onclick="applyInviteCode()" style="width:100%;">绑定邀请人</button>
          </div>
        </div>

        <!-- 留言 -->
        <div id="page-feedback" class="page">
          <div class="card">
            <h2>提交反馈</h2>
            <div class="form-group"><select id="feedbackType"><option value="suggestion">💡 建议</option><option value="bug">🐛 问题</option><option value="question">❓ 疑问</option><option value="other">📝 其他</option></select></div>
            <div class="form-group"><input type="text" id="feedbackTitle" placeholder="标题"></div>
            <div class="form-group"><textarea id="feedbackContent" rows="4" placeholder="详细描述"></textarea></div>
            <button class="btn btn-primary" onclick="submitFeedback()">提交</button>
          </div>
          <div class="card"><h2>我的留言</h2><div id="myFeedbackList"></div></div>
        </div>

        <!-- 购买 -->
        <div id="page-buy" class="page">
          <div class="card">
            <h2>购买卡密</h2>
            <div id="packagesList" class="loading">加载中...</div>
            <div id="paymentArea" class="hidden" style="text-align:center;margin-top:20px;">
              <h3 id="paymentMethodTitle">扫码支付</h3>
              <img id="qrCodeImage" src="" alt="收款码" style="width:220px;height:220px;object-fit:contain;border-radius:12px;border:2px solid var(--border);">
              <p style="font-size:16px;margin-top:10px;">金额：<strong style="color:var(--danger);" id="paymentAmount">¥0.00</strong></p>
              <p style="color:var(--danger);font-size:13px;">⚠️ 请精确支付此金额</p>
              <button class="btn btn-primary" onclick="checkPaymentStatus()">查询支付状态</button>
            </div>
            <div id="paymentResult" class="hidden" style="margin-top:20px;"></div>
          </div>
        </div>

        <!-- 记录 -->
        <div id="page-logs" class="page">
          <div class="card"><h2>签到记录</h2><div id="logsList"><p class="loading">加载中...</p></div></div>
        </div>

        <!-- 我的 -->
        <div id="page-profile" class="page">
          <div class="card">
            <h2>个人信息</h2>
            <div class="form-group"><label>学号</label><input type="text" id="profileStudentId" disabled></div>
            <div class="form-group"><label>姓名</label><input type="text" id="profileName"></div>
            <div class="form-group"><label>考勤密码</label><input type="password" id="profileAttendancePassword" placeholder="留空则不修改"></div>
            <div class="form-group"><label>邮箱</label><input type="text" id="profileEmail" disabled></div>
            <div class="form-group"><label>VIP</label><input type="text" id="profileVip" disabled></div>
            <button class="btn btn-primary" onclick="updateProfile()">保存</button>
          </div>
          <div class="card">
            <h2>兑换卡密</h2>
            <div class="form-group"><input type="text" id="redeemCode" placeholder="输入卡密" style="text-transform:uppercase;"></div>
            <button class="btn btn-primary" onclick="redeemCode()" style="width:100%;">兑换</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <script>
    const API_BASE = 'https://api.agai.online/api';
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/';
    let currentUser = JSON.parse(localStorage.getItem('user') || '{}');
    document.getElementById('userName').textContent = (currentUser.name || currentUser.studentId) + ' (' + currentUser.studentId + ')';
    let currentOrder = null, pollingTimer = null;
    const days = ['日','一','二','三','四','五','六'];

    // ========== 工具函数 ==========
    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = 'toast ' + (type || 'info') + ' show';
      clearTimeout(t._tid); t._tid = setTimeout(() => t.classList.remove('show'), 2500);
    }
    function escapeHTML(s) {
      if (!s) return ''; s = String(s);
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function escapeAttr(s) { return escapeHTML(s).replace(/'/g,'&#39;'); }
    async function api(url, opts) {
      opts = opts || {}; opts.headers = opts.headers || {};
      opts.headers['Authorization'] = 'Bearer ' + token;
      if (opts.body && typeof opts.body === 'object') { opts.body = JSON.stringify(opts.body); opts.headers['Content-Type'] = 'application/json'; }
      const res = await fetch(API_BASE + url, opts);
      return res.json();
    }

    // ========== 页面切换 ==========
    document.querySelectorAll('.menu-item').forEach(item => {
      item.addEventListener('click', () => {
        const page = item.dataset.page;
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + page).classList.add('active');
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        item.classList.add('active');
        if (page === 'dashboard') { loadStats(); loadActiveSubs(); loadNotice(); }
        else if (page === 'subscriptions') loadSubscriptions();
        else if (page === 'email') loadEmailStatus();
        else if (page === 'invite') loadInviteInfo();
        else if (page === 'feedback') loadMyFeedback();
        else if (page === 'buy') loadPackages();
        else if (page === 'logs') loadLogs();
        else if (page === 'profile') loadProfile();
      });
    });
    document.querySelectorAll('.weekday-btn').forEach(b => b.addEventListener('click', function(){ this.classList.toggle('selected'); }));

    // ========== 首页 ==========
    async function loadNotice() {
      try {
        const data = await api('/notice');
        if (data.success && data.notice && data.notice.enabled) {
          const n = data.notice;
          const styles = { info:{bg:'#d1ecf1',border:'#bee5eb',color:'#0c5460',icon:'📢'}, success:{bg:'#d4edda',border:'#c3e6cb',color:'#155724',icon:'✅'}, warning:{bg:'#fff3cd',border:'#ffeeba',color:'#856404',icon:'⚠️'}, error:{bg:'#f8d7da',border:'#f5c6cb',color:'#721c24',icon:'❌'} };
          const s = styles[n.style] || styles.info;
          document.getElementById('noticeTitle').innerHTML = '<i class="fas fa-bullhorn"></i> ' + s.icon + ' ' + escapeHTML(n.title);
          document.getElementById('noticeContent').innerHTML = '<div style="background:'+s.bg+';border-left:4px solid '+s.border+';padding:14px;border-radius:8px;color:'+s.color+';">'+escapeHTML(n.content)+'</div>';
          document.getElementById('noticeCard').classList.remove('hidden');
        }
      } catch(e) {}
    }
    async function loadStats() {
      try {
        const data = await api('/stats');
        if (data.success) {
          document.getElementById('statTotalSigns').textContent = data.stats.totalSigns || 0;
          document.getElementById('statSuccessSigns').textContent = data.stats.successSigns || 0;
          document.getElementById('statTodaySigns').textContent = data.stats.todaySigns || 0;
          document.getElementById('statActiveSubs').textContent = data.stats.activeSubscriptions || 0;
        }
      } catch(e) {}
    }
    async function loadActiveSubs() {
      try {
        const data = await api('/subscriptions');
        const container = document.getElementById('activeSubscriptionsList');
        if (data.success) {
          const active = data.subscriptions.filter(s => s.enabled);
          if (active.length === 0) { container.innerHTML = '<p class="empty">暂无活跃任务</p>'; return; }
          container.innerHTML = active.slice(0,3).map(s => '<div class="list-item"><div><h4>'+escapeHTML(s.name)+'</h4><p>⏰ '+escapeHTML(s.signTime)+' | 📅 '+(s.scheduleType==='daily'?'每天':(s.scheduleType==='weekdays'?'工作日':(s.customDays||[]).map(d=>days[d]).join('、')))+'</p></div></div>').join('');
        }
      } catch(e) {}
    }
    async function quickSign() {
      const btn = document.getElementById('quickSignBtn'), result = document.getElementById('signResult');
      btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 签到中...';
      try {
        const data = await api('/sign/manual', { method: 'POST' });
        if (data.success && data.result) {
          result.innerHTML = data.result.success ? '<span style="color:var(--success);">✅ 签到成功</span>' : '<span style="color:var(--danger);">❌ '+escapeHTML(data.result.message||'失败')+'</span>';
          loadStats();
        }
      } catch(e) { result.innerHTML = '<span style="color:var(--danger);">网络错误</span>'; }
      finally { btn.disabled = false; btn.innerHTML = '<i class="fas fa-pen"></i> 立即签到'; }
    }

    // ========== 任务管理 ==========
    async function loadSubscriptions() {
      try {
        const data = await api('/subscriptions');
        const container = document.getElementById('subscriptionsList');
        if (!data.subscriptions || data.subscriptions.length === 0) { container.innerHTML = '<p class="empty">暂无任务</p>'; return; }
        container.innerHTML = data.subscriptions.map(s => '<div class="list-item"><div><h4>'+escapeHTML(s.name)+'</h4><p>⏰ '+escapeHTML(s.signTime)+' | 📅 '+(s.scheduleType==='daily'?'每天':(s.scheduleType==='weekdays'?'工作日':(s.customDays||[]).map(d=>days[d]).join('、')))+' | 🔄 重试'+escapeHTML(s.maxRetries)+'次</p></div><div style="display:flex;align-items:center;gap:8px;"><span class="badge '+(s.enabled?'badge-success':'badge-danger')+'">'+(s.enabled?'启用':'禁用')+'</span><button class="btn btn-sm btn-outline" onclick="toggleSub(\''+escapeAttr(s._id)+'\','+!s.enabled+')">'+(s.enabled?'禁用':'启用')+'</button><button class="btn btn-sm btn-danger" onclick="deleteSub(\''+escapeAttr(s._id)+'\')"><i class="fas fa-trash"></i></button></div></div>').join('');
      } catch(e) {}
    }
    async function addSubscription() {
      const name = document.getElementById('courseName').value || '晚寝签到';
      const signTime = document.getElementById('signTime').value || '21:25';
      const maxRetries = parseInt(document.getElementById('maxRetries').value) || 3;
      const selectedDays = []; document.querySelectorAll('.weekday-btn.selected').forEach(b => selectedDays.push(parseInt(b.dataset.day)));
      let scheduleType = 'custom';
      if (selectedDays.length === 7) scheduleType = 'daily';
      else if (selectedDays.length === 5 && selectedDays.every(d => d >= 1 && d <= 5)) scheduleType = 'weekdays';
      try {
        const data = await api('/subscriptions', { method: 'POST', body: { name, scheduleType, customDays: selectedDays, signTime, maxRetries, autoSign: true, notifyOnSuccess: true, notifyOnFailure: true } });
        if (data.success) { showToast('添加成功', 'success'); loadSubscriptions(); loadStats(); }
        else showToast(data.message || '添加失败', 'error');
      } catch(e) { showToast('网络错误', 'error'); }
    }
    async function toggleSub(id, enabled) {
      try { await api('/subscriptions/' + id + '/toggle', { method: 'POST' }); loadSubscriptions(); loadStats(); }
      catch(e) { showToast('操作失败', 'error'); }
    }
    async function deleteSub(id) {
      if (!confirm('确定删除？')) return;
      try { await api('/subscriptions/' + id, { method: 'DELETE' }); loadSubscriptions(); loadStats(); }
      catch(e) { showToast('删除失败', 'error'); }
    }

    // ========== 邮箱 ==========
    async function loadEmailStatus() {
      await loadUserInfo();
      const container = document.getElementById('emailStatus');
      const form = document.getElementById('emailBindForm');
      const rebind = document.getElementById('rebindArea');
      if (currentUser.emailVerified) {
        container.innerHTML = '<div style="background:#d4edda;padding:14px;border-radius:10px;"><i class="fas fa-check-circle" style="color:var(--success);"></i> 已绑定：'+escapeHTML(currentUser.email)+'</div>';
        form.classList.add('hidden'); rebind.classList.remove('hidden');
      } else {
        container.innerHTML = '<div style="background:#fff3cd;padding:14px;border-radius:10px;"><i class="fas fa-info-circle" style="color:var(--warning);"></i> 未绑定邮箱</div>';
        form.classList.remove('hidden'); rebind.classList.add('hidden');
      }
    }
    async function sendEmailCode() {
      const email = document.getElementById('bindEmail').value;
      if (!email) { showToast('请输入邮箱', 'error'); return; }
      const btn = document.getElementById('sendCodeBtn'); btn.disabled = true;
      try {
        const data = await api('/email/send-code', { method: 'POST', body: { email } });
        if (data.success) { showToast('验证码已发送', 'success'); if (data.debugCode) document.getElementById('emailCode').value = data.debugCode; countdownBtn(btn); }
        else { showToast(data.message || '发送失败', 'error'); btn.disabled = false; }
      } catch(e) { showToast('网络错误', 'error'); btn.disabled = false; }
    }
    async function verifyEmail() {
      const email = document.getElementById('bindEmail').value, code = document.getElementById('emailCode').value;
      if (!email || !code) { showToast('请填写完整', 'error'); return; }
      try {
        const data = await api('/email/verify', { method: 'POST', body: { email, code } });
        if (data.success) { showToast('绑定成功', 'success'); await loadUserInfo(); loadEmailStatus(); }
        else showToast(data.message || '验证失败', 'error');
      } catch(e) { showToast('网络错误', 'error'); }
    }
    async function sendRebindCode() {
      const email = document.getElementById('rebindEmail').value;
      if (!email) { showToast('请输入新邮箱', 'error'); return; }
      const btn = document.getElementById('rebindSendBtn'); btn.disabled = true;
      try {
        const data = await api('/email/send-code', { method: 'POST', body: { email } });
        if (data.success) { showToast('验证码已发送', 'success'); if (data.debugCode) document.getElementById('rebindCode').value = data.debugCode; countdownBtn(btn); }
        else { showToast(data.message || '发送失败', 'error'); btn.disabled = false; }
      } catch(e) { showToast('网络错误', 'error'); btn.disabled = false; }
    }
    async function rebindEmail() {
      const email = document.getElementById('rebindEmail').value, code = document.getElementById('rebindCode').value;
      if (!email || !code) { showToast('请填写完整', 'error'); return; }
      try {
        const data = await api('/email/rebind', { method: 'POST', body: { email, code } });
        if (data.success) { showToast('换绑成功', 'success'); await loadUserInfo(); loadEmailStatus(); }
        else showToast(data.message || '换绑失败', 'error');
      } catch(e) { showToast('网络错误', 'error'); }
    }
    async function unbindEmail() {
      if (!confirm('确定解绑？VIP将失效。')) return;
      try {
        const data = await api('/email/unbind', { method: 'POST' });
        if (data.success) { showToast('已解绑', 'success'); await loadUserInfo(); loadEmailStatus(); }
        else showToast(data.message || '解绑失败', 'error');
      } catch(e) { showToast('网络错误', 'error'); }
    }

    // ========== 邀请 ==========
    async function loadInviteInfo() {
      try {
        const data = await api('/invite/info');
        if (data.success) {
          document.getElementById('inviteCode').textContent = data.inviteCode || '----';
          document.getElementById('inviteUrl').value = data.inviteUrl || '';
          document.getElementById('inviteCount').textContent = data.inviteCount || 0;
          document.getElementById('rewardDays').textContent = data.rewardDays || 10;
          if (currentUser.invitedBy) document.getElementById('bindInviteArea').innerHTML = '<div style="background:#d4edda;padding:10px;border-radius:8px;margin-bottom:10px;"><i class="fas fa-check-circle"></i> 已绑定邀请人</div>';
          const list = document.getElementById('invitedList');
          if (data.invitedUsers && data.invitedUsers.length) list.innerHTML = data.invitedUsers.map(u => '<div style="padding:8px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;"><span>'+escapeHTML(u.name||u.studentId)+'</span><span style="color:var(--text-secondary);font-size:12px;">'+new Date(u.createdAt).toLocaleDateString()+'</span></div>').join('');
          else list.innerHTML = '<p class="empty">暂无</p>';
        }
      } catch(e) {}
    }
    function copyInviteUrl() {
      const input = document.getElementById('inviteUrl');
      input.classList.remove('hidden'); input.select(); document.execCommand('copy'); input.classList.add('hidden');
      showToast('链接已复制', 'success');
    }
    function copyInviteCode() {
      const code = document.getElementById('inviteCode').textContent;
      if (!code || code === '----') return;
      const ta = document.createElement('textarea'); ta.value = code; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      showToast('邀请码已复制', 'success');
    }
    async function applyInviteCode() {
      const code = document.getElementById('inputInviteCode').value.trim().toUpperCase();
      if (!code) { showToast('请输入邀请码', 'error'); return; }
      try {
        const data = await api('/invite/apply', { method: 'POST', body: { inviteCode: code } });
        if (data.success) { showToast(data.message, 'success'); await loadUserInfo(); loadInviteInfo(); }
        else showToast(data.message || '绑定失败', 'error');
      } catch(e) { showToast('网络错误', 'error'); }
    }

    // ========== 留言 ==========
    async function submitFeedback() {
      const title = document.getElementById('feedbackTitle').value.trim(), content = document.getElementById('feedbackContent').value.trim(), type = document.getElementById('feedbackType').value;
      if (!title || !content) { showToast('请填写完整', 'error'); return; }
      try {
        const data = await api('/feedback', { method: 'POST', body: { title, content, type } });
        if (data.success) { showToast('提交成功', 'success'); document.getElementById('feedbackTitle').value = ''; document.getElementById('feedbackContent').value = ''; loadMyFeedback(); }
        else showToast(data.message || '提交失败', 'error');
      } catch(e) { showToast('网络错误', 'error'); }
    }
    async function loadMyFeedback() {
      try {
        const data = await api('/feedback/my');
        const container = document.getElementById('myFeedbackList');
        if (!data.feedbacks || !data.feedbacks.length) { container.innerHTML = '<p class="empty">暂无留言</p>'; return; }
        const tm = { bug:'🐛', suggestion:'💡', question:'❓', other:'📝' };
        const sm = { pending:'⏳待处理', read:'👀已读', replied:'✅已回复', closed:'🔒已关闭' };
        container.innerHTML = data.feedbacks.map(f => '<div class="list-item" style="cursor:pointer;" onclick="viewFeedback(\''+escapeAttr(f._id)+'\')"><div><h4>'+tm[f.type]+' '+escapeHTML(f.title)+'</h4><p style="font-size:12px;">'+sm[f.status]+' · '+new Date(f.createdAt).toLocaleString()+'</p></div><i class="fas fa-chevron-right" style="color:#ccc;"></i></div>').join('');
      } catch(e) {}
    }
    async function viewFeedback(id) {
      try {
        const data = await api('/feedback/' + id);
        if (data.success) {
          const f = data.feedback;
          const detail = '<div style="margin:16px 0;">'+escapeHTML(f.content).replace(/\n/g,'<br>')+'</div>' + (f.adminReply ? '<div style="background:#d4edda;padding:12px;border-radius:8px;border-left:4px solid var(--success);"><strong>回复：</strong>'+escapeHTML(f.adminReply).replace(/\n/g,'<br>')+'</div>' : '<p class="empty">暂无回复</p>');
          alert('标题：'+f.title+'\n\n内容：'+f.content+'\n\n'+(f.adminReply?'回复：'+f.adminReply:'暂无回复'));
        }
      } catch(e) {}
    }

    // ========== 购买 ==========
    async function loadPackages() {
      try {
        const data = await api('/payment/packages');
        if (data.success) {
          document.getElementById('packagesList').innerHTML = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;">' + data.packages.map(p => '<div class="card" style="text-align:center;cursor:pointer;padding:16px;" onclick="selectPackage('+(p.days||0)+','+(p.times||0)+','+p.price+',\''+(p.cardCategory||'days')+'\')"><h3>'+escapeHTML(p.name)+'</h3><p style="font-size:24px;font-weight:700;color:var(--warning);">¥'+p.price+'</p><p style="color:var(--text-secondary);font-size:12px;">'+escapeHTML(p.description)+'</p></div>').join('') + '</div>';
        }
      } catch(e) {}
    }
    async function selectPackage(days, times, price, cat) {
      const label = cat === 'times' ? times+'次' : days+'天';
      const method = confirm('【'+label+'】¥'+price+'\n确定=微信 | 取消=支付宝') ? 'wechat' : 'alipay';
      const mn = method === 'wechat' ? '微信' : '支付宝';
      if (!confirm('使用【'+mn+'】支付 ¥'+price+'？')) return;
      try {
        const body = cat === 'times' ? { times, cardCategory: cat, payMethod: method } : { days, cardCategory: cat, payMethod: method };
        const data = await api('/payment/create-order', { method: 'POST', body });
        if (data.success) {
          currentOrder = data.order;
          document.getElementById('paymentArea').classList.remove('hidden');
          document.getElementById('paymentMethodTitle').textContent = '【'+mn+'】扫码支付';
          document.getElementById('paymentAmount').textContent = '¥'+data.order.amount.toFixed(2);
          document.getElementById('qrCodeImage').src = method==='wechat' ? data.qrCodes.wechat : data.qrCodes.alipay;
          document.getElementById('paymentResult').classList.add('hidden');
          showToast('请精确支付 ¥'+data.order.amount.toFixed(2), 'info');
          startPolling(data.order.orderNo);
        } else showToast(data.message || '失败', 'error');
      } catch(e) { showToast('网络错误', 'error'); }
    }
    function startPolling(orderNo) {
      if (pollingTimer) clearInterval(pollingTimer);
      pollingTimer = setInterval(() => checkPaymentStatus(orderNo), 5000);
    }
    async function checkPaymentStatus(orderNo) {
      const id = orderNo || (currentOrder && currentOrder.orderNo);
      if (!id) return;
      try {
        const data = await api('/payment/order/' + id);
        if (data.success && data.order.status === 'paid') {
          clearInterval(pollingTimer); pollingTimer = null;
          const label = data.order.cardCategory==='times'?data.order.times+'次':data.order.days+'天';
          document.getElementById('paymentResult').innerHTML = '<div style="background:#d4edda;padding:20px;border-radius:10px;text-align:center;"><p style="font-size:20px;">🎉 支付成功</p><p>卡密：<strong style="font-size:22px;letter-spacing:3px;">'+escapeHTML(data.cardCode||'')+'</strong></p><p>'+escapeHTML(label)+' | ¥'+Number(data.order.amount||0).toFixed(2)+'</p>'+(data.cardCode?'<button class="btn btn-primary btn-sm" onclick="copyCardCode(\''+escapeAttr(data.cardCode)+'\')"><i class="fas fa-copy"></i> 复制卡密</button>':'')+'</div>';
          document.getElementById('paymentResult').classList.remove('hidden');
          document.getElementById('paymentArea').classList.add('hidden');
        }
      } catch(e) {}
    }
    function copyCardCode(code) {
      const ta = document.createElement('textarea'); ta.value = code; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      showToast('卡密已复制', 'success');
    }

    // ========== 记录 ==========
    async function loadLogs() {
      try {
        const data = await api('/sign/logs?limit=50');
        const container = document.getElementById('logsList');
        if (!data.logs || !data.logs.length) { container.innerHTML = '<p class="empty">暂无记录</p>'; return; }
        container.innerHTML = data.logs.map(l => '<div class="log-row"><span class="status">'+(l.status==='success'?'✅':'❌')+'</span><div class="detail"><div class="title">'+escapeHTML(l.subscriptionName||'手动')+'</div><div class="time">'+new Date(l.executedAt||l.signTime).toLocaleString('zh-CN')+'</div></div><span class="msg">'+escapeHTML(l.message||'')+'</span></div>').join('');
      } catch(e) {}
    }

    // ========== 我的 ==========
    async function loadProfile() {
      await loadUserInfo();
      document.getElementById('profileStudentId').value = currentUser.studentId || '';
      document.getElementById('profileName').value = currentUser.name || '';
      document.getElementById('profileAttendancePassword').value = '';
      document.getElementById('profileEmail').value = currentUser.email || '未绑定';
      let vt = '免费用户';
      if (currentUser.isVip) { const d = currentUser.vipExpireAt ? new Date(currentUser.vipExpireAt) : null; vt = d && d > new Date() ? 'VIP 至 '+d.toLocaleDateString() : 'VIP 已过期'; }
      document.getElementById('profileVip').value = vt;
    }
    async function updateProfile() {
      const body = { name: document.getElementById('profileName').value };
      const pwd = document.getElementById('profileAttendancePassword').value.trim();
      if (pwd) body.attendancePassword = pwd;
      try {
        const data = await api('/user/profile', { method: 'PUT', body });
        if (data.success) { showToast('已保存', 'success'); document.getElementById('profileAttendancePassword').value = ''; await loadUserInfo(); }
        else showToast(data.message || '保存失败', 'error');
      } catch(e) { showToast('网络错误', 'error'); }
    }
    async function redeemCode() {
      const code = document.getElementById('redeemCode').value.trim().toUpperCase();
      if (!code) { showToast('请输入卡密', 'error'); return; }
      try {
        const data = await api('/vip/redeem', { method: 'POST', body: { code } });
        if (data.success) { showToast(data.message, 'success'); document.getElementById('redeemCode').value = ''; await loadUserInfo(); loadStats(); }
        else showToast(data.message || '兑换失败', 'error');
      } catch(e) { showToast('网络错误', 'error'); }
    }

    // ========== 通用 ==========
    async function loadUserInfo() {
      try {
        const data = await api('/user/profile');
        if (data.success) { currentUser = data.user; localStorage.setItem('user', JSON.stringify(currentUser)); document.getElementById('userName').textContent = (currentUser.name||currentUser.studentId)+' ('+currentUser.studentId+')'; }
      } catch(e) {}
    }
    function countdownBtn(btn) {
      let cd = 60; btn.textContent = cd + 's';
      const t = setInterval(() => { cd--; btn.textContent = cd + 's'; if (cd <= 0) { clearInterval(t); btn.disabled = false; btn.textContent = '发送验证码'; } }, 1000);
    }
    function logout() { localStorage.clear(); window.location.href = '/'; }
    loadUserInfo(); loadStats(); loadActiveSubs(); loadNotice();
  </script>
</body>
</html>
